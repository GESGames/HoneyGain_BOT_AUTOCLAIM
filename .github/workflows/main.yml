name: HoneyGain_BOT_AUTOCLAIM

on:
  workflow_dispatch:

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Exec Bot
        env:
          HG_EMAIL: ${{ secrets.HG_EMAIL }}
          HG_PASSWORD: ${{ secrets.HG_PASSWORD }}
        run: python main.py
