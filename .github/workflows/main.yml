name: HoneyGain_BOT_AUTOCLAIM

on:
  schedule:
    - cron: '0 0 * * *' # Corre cada día a medianoche
  workflow_dispatch: # Permite correrlo manualmente para probar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Versión estándar de Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Bot
        env:
          HG_EMAIL: ${{ secrets.HG_EMAIL }}
          HG_PASSWORD: ${{ secrets.HG_PASSWORD }}
        run: python main.py
